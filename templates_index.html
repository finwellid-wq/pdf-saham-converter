<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF to Excel Converter - Saham Indonesia</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            padding: 40px;
        }
        h1 { color: #333; margin-bottom: 10px; font-size: 28px; }
        .subtitle { color: #666; margin-bottom: 30px; font-size: 14px; }
        .drop-zone {
            border: 2px dashed #667eea;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            background: #f8f9ff;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }
        .drop-zone:hover { border-color: #764ba2; background: #f0f2ff; }
        .drop-zone.drag-over { border-color: #764ba2; background: #e8ebff; transform: scale(1.02); }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #764ba2; }
        .file-list {
            background: #f8f9ff;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            display: none;
        }
        .file-item {
            background: white;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #e0e0e0;
            font-size: 13px;
        }
        .file-item button {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        .status {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
            font-size: 13px;
        }
        .status.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .status.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .status.info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .button-group button { flex: 1; min-width: 120px; }
        .preview {
            display: none;
            margin-bottom: 20px;
        }
        .table-container {
            border: 1px solid #ddd;
            border-radius: 6px;
            overflow-x: auto;
            max-height: 400px;
            overflow-y: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }
        th {
            background: #f0f2ff;
            padding: 10px;
            text-align: left;
            font-weight: 600;
            color: #333;
            position: sticky;
            top: 0;
            border-bottom: 1px solid #ddd;
        }
        td {
            padding: 8px 10px;
            border-bottom: 1px solid #eee;
            color: #555;
        }
        input[type="file"] { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 PDF to Excel Converter</h1>
        <p class="subtitle">Upload 1-20 PDF laporan saham → Merge jadi 1 Excel</p>

        <div class="drop-zone" id="dropZone">
            <p>Drag & drop PDF files here</p>
            <p style="color: #999; font-size: 12px; margin: 10px 0;">atau</p>
            <button class="btn btn-primary" onclick="document.getElementById('pdfInput').click()">
                Choose PDF Files
            </button>
            <input type="file" id="pdfInput" multiple accept=".pdf" onchange="handleFileSelect(event)">
        </div>

        <div class="file-list" id="fileList">
            <h3 style="margin-bottom: 10px;">Files Selected:</h3>
            <div id="fileItems"></div>
        </div>

        <div class="status" id="status"></div>

        <div class="button-group" id="actionButtons" style="display: none;">
            <button class="btn btn-primary" onclick="processFiles()">Process & Merge</button>
            <button class="btn" style="background: #6c757d; color: white;" onclick="resetForm()">Reset</button>
        </div>

        <div class="preview" id="preview">
            <h3 style="margin-bottom: 10px;">Preview (First 10 rows):</h3>
            <div class="table-container">
                <table id="previewTable">
                    <thead></thead>
                    <tbody></tbody>
                </table>
            </div>
            <p class="stats" id="stats" style="color: #666; font-size: 13px; margin-top: 10px;"></p>
            <button class="btn btn-primary" style="margin-top: 15px; width: 100%;" onclick="downloadExcel()">
                Download Excel
            </button>
        </div>
    </div>

    <script>
        let selectedFiles = [];
        let mergedData = [];

        document.getElementById('dropZone').addEventListener('dragover', (e) => {
            e.preventDefault();
            document.getElementById('dropZone').classList.add('drag-over');
        });

        document.getElementById('dropZone').addEventListener('dragleave', () => {
            document.getElementById('dropZone').classList.remove('drag-over');
        });

        document.getElementById('dropZone').addEventListener('drop', (e) => {
            e.preventDefault();
            document.getElementById('dropZone').classList.remove('drag-over');
            selectedFiles = Array.from(e.dataTransfer.files).filter(f => f.name.endsWith('.pdf'));
            displayFileList();
        });

        function handleFileSelect(e) {
            selectedFiles = Array.from(e.target.files);
            displayFileList();
        }

        function displayFileList() {
            const fileList = document.getElementById('fileList');
            const fileItems = document.getElementById('fileItems');
            const actionButtons = document.getElementById('actionButtons');
            
            fileItems.innerHTML = '';
            selectedFiles.forEach((file, idx) => {
                const div = document.createElement('div');
                div.className = 'file-item';
                div.innerHTML = `
                    <span>${idx + 1}. ${file.name}</span>
                    <button onclick="removeFile(${idx})">Remove</button>
                `;
                fileItems.appendChild(div);
            });
            
            fileList.style.display = selectedFiles.length > 0 ? 'block' : 'none';
            actionButtons.style.display = selectedFiles.length > 0 ? 'flex' : 'none';
        }

        function removeFile(idx) {
            selectedFiles.splice(idx, 1);
            displayFileList();
        }

        function processFiles() {
            if (selectedFiles.length === 0) {
                showStatus('Upload PDF files dulu!', 'error');
                return;
            }

            showStatus('Processing ' + selectedFiles.length + ' PDF files...', 'info');
            
            const formData = new FormData();
            selectedFiles.forEach(file => {
                formData.append('files', file);
            });

            fetch('/api/process', {
                method: 'POST',
                body: formData
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    mergedData = data.data;
                    showPreview();
                    showStatus('✓ Success! ' + mergedData.length + ' transactions merged.', 'success');
                } else {
                    showStatus('Error: ' + data.error, 'error');
                }
            })
            .catch(err => {
                showStatus('Error: ' + err.message, 'error');
            });
        }

        function showPreview() {
            const preview = document.getElementById('preview');
            const table = document.getElementById('previewTable');
            
            table.innerHTML = '<thead><tr></tr></thead><tbody></tbody>';
            
            const headers = ['saham', 'date', 'broker', 'big_player', 'jumlah_sebelum', 'change', 'jumlah_sesudah', 'harga'];
            const headerRow = table.querySelector('thead tr');
            
            headers.forEach(h => {
                const th = document.createElement('th');
                th.textContent = h;
                headerRow.appendChild(th);
            });
            
            const tbody = table.querySelector('tbody');
            mergedData.slice(0, 10).forEach(row => {
                const tr = document.createElement('tr');
                headers.forEach(h => {
                    const td = document.createElement('td');
                    const val = row[h];
                    if (typeof val === 'number' && val > 1000) {
                        td.textContent = val.toLocaleString('id-ID');
                    } else {
                        td.textContent = val;
                    }
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            });
            
            preview.style.display = 'block';
            document.getElementById('stats').textContent = 'Total: ' + mergedData.length + ' transactions from ' + selectedFiles.length + ' files';
        }

        function showStatus(msg, type) {
            const status = document.getElementById('status');
            status.textContent = msg;
            status.className = 'status ' + type;
            status.style.display = 'block';
        }

        function downloadExcel() {
            window.location.href = '/api/download';
        }

        function resetForm() {
            selectedFiles = [];
            mergedData = [];
            document.getElementById('pdfInput').value = '';
            document.getElementById('fileList').style.display = 'none';
            document.getElementById('preview').style.display = 'none';
            document.getElementById('status').style.display = 'none';
            document.getElementById('actionButtons').style.display = 'none';
        }
    </script>
</body>
</html>
